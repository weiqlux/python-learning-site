<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 配置成功 - 智能添加</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .success-card {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
        .success-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        .success-card h1 {
            color: #28a745;
            margin-bottom: 20px;
        }
        .success-card p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .config-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        .config-info dl {
            display: grid;
            grid-template-columns: max-content 1fr;
            gap: 10px;
        }
        .config-info dt {
            font-weight: 600;
            color: #555;
        }
        .config-info dd {
            margin: 0;
            color: #333;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .action-buttons a {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>✅ 配置成功</h1>
            <p class="subtitle">智能添加功能已就绪</p>
        </div>
    </header>

    <main class="container">
        <div class="success-card">
            <div class="success-icon">🎉</div>
            <h1>API 配置成功！</h1>
            <p>阿里云 DashScope API Key 已配置完成</p>
            <p>现在可以使用智能添加功能了！</p>
            
            <div class="config-info">
                <dl>
                    <dt>🔑 API Key</dt>
                    <dd>已配置 ✓</dd>
                    <dt>🧠 模型</dt>
                    <dd>qwen-vl-max（通义千问视觉模型）</dd>
                    <dt>📊 免费额度</dt>
                    <dd>新用户赠送（详见控制台）</dd>
                    <dt>💰 参考价格</dt>
                    <dd>约 0.02 元/千 tokens</dd>
                </dl>
            </div>
            
            <div class="action-buttons">
                <a href="/smart-add" class="btn-primary">🤖 开始智能添加</a>
                <a href="/translation-db" class="btn-secondary">📚 查看题库</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Python 学习网 © 2026 | 智能添加配置成功</p>
        </div>
    </footer>
</body>
</html>
